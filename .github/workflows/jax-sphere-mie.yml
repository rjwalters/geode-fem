name: jax-sphere-mie

# Gated CI job for the JAX anisotropic-UPML sphere-Mie reference
# (Epic #88 / Phase J.4, issue #173).
#
# Option A drift gate, following `jax-sphere-pml.yml` (#159 / #165): the
# JAX pipeline is re-run in CI and the freshly emitted fixture is
# strictly diffed against the committed snapshot at
# `reference/fixtures/sphere_mie_small/jax_baseline.json` within each
# field's declared `tolerance_abs` (c128 fields on |Δ|).
#
# This gate also re-runs the Phase J.4 **autodiff probe** (jax.grad
# through the tensor-valued complex-ε assembly path) on every relevant
# PR: the probe verdict (`autodiff_jit_ok` / `autodiff_grad_ok` /
# `autodiff_grad_finite`) is recorded as fixture output fields, so a
# JAX upgrade that breaks c128 tensor-kernel VJPs fails this gate
# loudly instead of rotting silently. The generator additionally
# hard-asserts the JAX spectrum against the committed NumPy J.2
# baseline (`sphere_mie_small/baseline.json`) and the J.1 analytic
# catalogue at generation time.
#
# Scope: σ₀=5.0, k₀_ref=2.0 on the 197-tet small mesh
# (`sphere_pml_small/sphere.msh`) — the granularity default CI can
# check (#158 / #164 / #160 precedent). The dense host-LAPACK ZGGEV on
# the ~214-DOF interior pencil is sub-second.
#
# Complementary to the Rust per-PR drift gate in
# `geode-validation/tests/sphere_mie_jax_reference.rs` (Burn vs the
# committed JAX snapshot). Both must pass: the Rust gate guards Burn vs
# the snapshot, this gate guards the snapshot vs the JAX pipeline.

on:
  push:
    branches: [main]
    paths:
      - 'reference/jax/sphere_mie.py'
      - 'reference/jax/gen_sphere_mie_fixture.py'
      # Kernel + algorithmic dependencies of the JAX Mie pipeline:
      - 'reference/jax/sphere_pec.py'
      - 'reference/jax/requirements.txt'
      - 'reference/numpy/sphere_mie.py'
      - 'reference/numpy/sphere_pec.py'
      - 'reference/numpy/sphere_pml.py'
      - 'reference/numpy/nedelec_local_matrices.py'
      # Committed snapshot + generation-time cross-check inputs:
      - 'reference/fixtures/sphere_mie_small/jax_baseline.json'
      - 'reference/fixtures/sphere_mie_small/baseline.json'
      - 'reference/fixtures/sphere_pml_small/sphere.msh'
      - 'reference/fixtures/mie_roots/baseline.json'
      - '.github/workflows/jax-sphere-mie.yml'
  pull_request:
    branches: [main]
    paths:
      - 'reference/jax/sphere_mie.py'
      - 'reference/jax/gen_sphere_mie_fixture.py'
      - 'reference/jax/sphere_pec.py'
      - 'reference/jax/requirements.txt'
      - 'reference/numpy/sphere_mie.py'
      - 'reference/numpy/sphere_pec.py'
      - 'reference/numpy/sphere_pml.py'
      - 'reference/numpy/nedelec_local_matrices.py'
      - 'reference/fixtures/sphere_mie_small/jax_baseline.json'
      - 'reference/fixtures/sphere_mie_small/baseline.json'
      - 'reference/fixtures/sphere_pml_small/sphere.msh'
      - 'reference/fixtures/mie_roots/baseline.json'
      - '.github/workflows/jax-sphere-mie.yml'
  workflow_dispatch:
    inputs:
      sigma0:
        description: 'UPML absorption strength (default 5.0 — matches jax_baseline.json).'
        required: false
        default: '5.0'

jobs:
  build-and-drift-check:
    name: JAX sphere-Mie pipeline + strict snapshot drift gate
    runs-on: ubuntu-latest
    env:
      MIE_SIGMA0: ${{ inputs.sigma0 || '5.0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            reference/jax/requirements.txt
            reference/numpy/requirements.txt

      - name: Install JAX (CPU) + NumPy + SciPy + meshio
        # Same dual-requirements install as jax-sphere-pml.yml: the JAX
        # Mie pipeline transitively depends on the NumPy reference for
        # mesh I/O (meshio) and the dense eigensolve boundary (scipy).
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r reference/jax/requirements.txt
          python3 -m pip install -r reference/numpy/requirements.txt

      - name: Show toolchain versions (debug)
        run: |
          python3 --version
          python3 -c "import jax, numpy, scipy; print('jax', jax.__version__); print('numpy', numpy.__version__); print('scipy', scipy.__version__)"
          python3 -c "import meshio; print('meshio', meshio.__version__)"

      - name: Run JAX sphere-Mie pipeline (regenerate fixture for drift comparator)
        # Regenerates the fixture into target/out. The generator itself
        # hard-asserts: NumPy J.2 spectrum agreement (dense vs dense),
        # the J.1 analytic TM_1,1 anchor (8% band), Q tripwires, the
        # #160 cluster-closure gap, the σ₀=0 collapse, and a clean
        # autodiff probe verdict. The committed file in
        # reference/fixtures/sphere_mie_small/ is the snapshot; this
        # step is the snapshot's gate.
        run: |
          mkdir -p reference/jax/target/out
          python3 reference/jax/gen_sphere_mie_fixture.py \
              --out reference/jax/target/out/jax_baseline.json \
              --sigma0 "${MIE_SIGMA0}"

      - name: Snapshot drift gate — fresh JAX sphere-Mie fixture vs committed
        # Strict numeric diff: every output field in the freshly emitted
        # fixture must agree with the committed
        # `reference/fixtures/sphere_mie_small/jax_baseline.json` within
        # the field's declared `tolerance_abs`. c128 fields are compared
        # on |Δ| per reference/SCHEMA.md. The inline comparator mirrors
        # the one in `jax-sphere-pml.yml` so the behavior (and failure
        # message) is identical across the JAX gates.
        run: |
          python3 <<'PY'
          import json, math, sys
          from pathlib import Path

          fresh_path     = Path("reference/jax/target/out/jax_baseline.json")
          committed_path = Path("reference/fixtures/sphere_mie_small/jax_baseline.json")

          def load(p):
              with open(p) as f:
                  return json.load(f)

          fresh     = load(fresh_path)
          committed = load(committed_path)

          fresh_out     = fresh["outputs"]
          committed_out = committed["outputs"]

          missing_in_fresh     = set(committed_out) - set(fresh_out)
          missing_in_committed = set(fresh_out)     - set(committed_out)
          if missing_in_fresh or missing_in_committed:
              print(f"FAIL: output-field set mismatch", file=sys.stderr)
              print(f"  missing in fresh     : {sorted(missing_in_fresh)}", file=sys.stderr)
              print(f"  missing in committed : {sorted(missing_in_committed)}", file=sys.stderr)
              sys.exit(1)

          n_fail = 0
          n_ok   = 0
          for name in sorted(fresh_out):
              f = fresh_out[name]
              c = committed_out[name]
              tol = float(c.get("tolerance_abs", 0.0))
              dtype = c.get("dtype", "f64")
              fd = list(f["data"])
              cd = list(c["data"])
              if len(fd) != len(cd):
                  print(f"FAIL [{name}]: length mismatch fresh={len(fd)} committed={len(cd)}",
                        file=sys.stderr)
                  n_fail += 1
                  continue
              if dtype == "c128":
                  if len(fd) % 2 != 0:
                      print(f"FAIL [{name}]: c128 interleave length must be even, got {len(fd)}",
                            file=sys.stderr)
                      n_fail += 1
                      continue
                  max_abs = 0.0
                  worst_i = -1
                  for i in range(0, len(fd), 2):
                      dr = fd[i]   - cd[i]
                      di = fd[i+1] - cd[i+1]
                      mag = math.hypot(dr, di)
                      if mag > max_abs:
                          max_abs = mag
                          worst_i = i // 2
                  status = "OK" if max_abs <= tol else "FAIL"
                  print(f"  [{status}] {name:42s} (c128) "
                        f"max |Δ| = {max_abs:.6e}  tol = {tol:.6e}  "
                        f"worst_idx = {worst_i}")
                  if max_abs > tol:
                      lj_re = fd[2*worst_i]   ; lj_im = fd[2*worst_i+1]
                      lc_re = cd[2*worst_i]   ; lc_im = cd[2*worst_i+1]
                      print(f"      fresh[{worst_i}]     = ({lj_re:+.9e}, {lj_im:+.9e})",
                            file=sys.stderr)
                      print(f"      committed[{worst_i}] = ({lc_re:+.9e}, {lc_im:+.9e})",
                            file=sys.stderr)
                      n_fail += 1
                  else:
                      n_ok += 1
              else:
                  max_abs = max((abs(a - b) for a, b in zip(fd, cd)), default=0.0)
                  status = "OK" if max_abs <= tol else "FAIL"
                  print(f"  [{status}] {name:42s} ({dtype:>4}) "
                        f"max |Δ| = {max_abs:.6e}  tol = {tol:.6e}")
                  if max_abs > tol:
                      n_fail += 1
                  else:
                      n_ok += 1

          print()
          print(f"summary: {n_ok} fields OK, {n_fail} fields FAIL")
          if n_fail > 0:
              print()
              print("snapshot is stale — regenerate locally with:", file=sys.stderr)
              print("  python3 reference/jax/gen_sphere_mie_fixture.py "
                    "--out reference/fixtures/sphere_mie_small/jax_baseline.json "
                    "--sigma0 5.0", file=sys.stderr)
              print("then commit the regenerated fixture.", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Upload JAX sidecar artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jax-sphere-mie-artifacts
          path: |
            reference/jax/target/out/jax_baseline.json
          if-no-files-found: warn
          retention-days: 30
