name: tfjava-cube-cavity

# Gated, optional CI job for the TF-Java cube-cavity, sphere-PEC, sphere-PML,
# AND sphere-Mie references (Epic #88 / #93 / #102 / #134 / #156 / #174).
#
# TF-Java pulls ~200 MB of native libraries and requires JDK 17+, so this
# workflow is intentionally NOT part of the default per-push CI matrix.
# It triggers in two ways:
#
#   1. Path-filtered `pull_request` / `push` to main: runs only when the
#      change actually touches the TF-Java reference (its Maven projects,
#      Java sources, sidecar drivers, or sphere-PEC fixture / driver).
#   2. Manual `workflow_dispatch`: run on demand against any branch.
#
# Per #102 acceptance: this closes the loop on #93 AC#3 (TF-Java reference
# builds and runs end-to-end) and #93 AC#4 (cross-IR NumPy / JAX / TF-Java
# agreement table) by actually exercising the pipeline in CI and
# asserting agreement to 1e-5 relative on the lowest 5 modes.
#
# Per #134 acceptance: adds a sphere-PEC job that exercises the Nédélec
# curl-curl assembly (TF-Java static graph), PEC boundary elimination,
# and SciPy eigensolve with spurious-mode filtering via the algebraic
# d⁰-rank classifier (Issue #124), asserting 1e-5 relative agreement
# on the lowest 5 physical eigenvalues vs reference/fixtures/sphere_pec/baseline.json.
#
# Per #156 acceptance (Phase H.4): adds a sphere-PML job that exercises the
# complex-Nédélec assembly with the scalar-isotropic PML profile (TF-Java
# static graph emitting Re(M) and Im(M) as parallel f64 tensors, since
# TF-Java 1.0.0 has no native c128 typed value), PEC boundary elimination,
# and the SciPy dense LAPACK ZGGEV complex generalized eigensolve with
# canonical Im(λ) > 0 sign per PR #155, asserting 1e-3 absolute agreement
# on the lowest physical complex eigenvalue vs the NumPy canonical baseline.
#
# Per #174 acceptance (Phase J.5): adds a sphere-Mie job that exercises the
# TENSOR-constitutive complex-Nédélec assembly — the per-tet diagonal
# anisotropic UPML permittivity tensor (ε_x, ε_y, ε_z) enters the TF-Java
# static graph as two parallel [nTets, 3] f64 placeholders and the per-axis
# cofactor gram is contracted against it inside the graph — then runs the
# SciPy dense LAPACK ZGGEV via the sidecar driver with NO sign
# canonicalization (physical Im(λ) < 0 is a property of the small-mesh
# tensor pencil), hard-gating per-position 1e-4 absolute agreement on the
# physical band vs the NumPy J.2 canonical baseline AND vs the checked-in
# tfjava_baseline.json snapshot.
#
# Scope clarification (issue #111): the Burn row is exercised separately by
# the `arpack` workflow and per-push cargo tests. We deliberately do not
# rebuild `geode-core` inside this JVM-heavy job; keeping toolchains
# decoupled keeps both gates fast.

on:
  push:
    branches: [main]
    paths:
      - 'reference/tf_java/**'
      - 'reference/driver/eigensolve_from_tfjava.py'
      - 'reference/driver/eigensolve_from_sidecar.py'
      - 'reference/driver/eigensolve_sphere_pec_sidecar.py'
      - 'reference/driver/compare_eigenvalues.py'
      - 'reference/driver/emit_numpy_eigenvalues.py'
      - 'reference/numpy/cube_cavity_minimal.py'
      - 'reference/numpy/p1_local_matrices.py'
      - 'reference/numpy/nedelec_local_matrices.py'
      - 'reference/numpy/sphere_pec.py'
      - 'reference/numpy/sphere_pml.py'
      - 'reference/numpy/requirements.txt'
      - 'reference/fixtures/cube_cavity/jax_baseline.json'
      - 'reference/fixtures/sphere_pec/baseline.json'
      - 'reference/fixtures/sphere_pec/tfjava_sidecar.json'
      - 'reference/fixtures/sphere_pec/sphere.msh'
      - 'reference/fixtures/sphere_pml/baseline.json'
      - 'reference/fixtures/sphere_pml/tfjava_baseline.json'
      - 'reference/fixtures/sphere_pml/sphere.msh'
      - 'reference/numpy/sphere_mie.py'
      - 'reference/fixtures/sphere_mie_small/baseline.json'
      - 'reference/fixtures/sphere_mie_small/tfjava_baseline.json'
      - 'reference/fixtures/sphere_pml_small/sphere.msh'
      - '.github/workflows/tfjava-cube-cavity.yml'
  pull_request:
    branches: [main]
    paths:
      - 'reference/tf_java/**'
      - 'reference/driver/eigensolve_from_tfjava.py'
      - 'reference/driver/eigensolve_from_sidecar.py'
      - 'reference/driver/eigensolve_sphere_pec_sidecar.py'
      - 'reference/driver/compare_eigenvalues.py'
      - 'reference/driver/emit_numpy_eigenvalues.py'
      - 'reference/numpy/cube_cavity_minimal.py'
      - 'reference/numpy/p1_local_matrices.py'
      - 'reference/numpy/nedelec_local_matrices.py'
      - 'reference/numpy/sphere_pec.py'
      - 'reference/numpy/sphere_pml.py'
      - 'reference/numpy/requirements.txt'
      - 'reference/fixtures/cube_cavity/jax_baseline.json'
      - 'reference/fixtures/sphere_pec/baseline.json'
      - 'reference/fixtures/sphere_pec/tfjava_sidecar.json'
      - 'reference/fixtures/sphere_pec/sphere.msh'
      - 'reference/fixtures/sphere_pml/baseline.json'
      - 'reference/fixtures/sphere_pml/tfjava_baseline.json'
      - 'reference/fixtures/sphere_pml/sphere.msh'
      - 'reference/numpy/sphere_mie.py'
      - 'reference/fixtures/sphere_mie_small/baseline.json'
      - 'reference/fixtures/sphere_mie_small/tfjava_baseline.json'
      - 'reference/fixtures/sphere_pml_small/sphere.msh'
      - '.github/workflows/tfjava-cube-cavity.yml'
  workflow_dispatch:
    inputs:
      n:
        description: 'Cells per side for the cube mesh (default 4).'
        required: false
        default: '4'
      rtol:
        description: 'Relative tolerance for the cross-backend eigenvalue gate.'
        required: false
        default: '1e-5'

jobs:
  build-and-cross-check:
    name: TF-Java assembly + SciPy eigensolve + cross-IR agreement (TF-Java vs JAX vs NumPy)
    runs-on: ubuntu-latest
    # Bound queue-wait + execution so this cross-check can never orphan
    # for the 24h GitHub ceiling (issue #354). JDK 17 + Maven + native
    # TF-Java libs make this heavy; 30 min leaves headroom for a cold
    # Maven cache.
    timeout-minutes: 30
    env:
      MAVEN_OPTS: "-Xmx2g"
      # `n` and `rtol` are derived once here so manual-dispatch overrides
      # flow into every step. Defaults match the AC: n=4, rtol=1e-5.
      CUBE_N: ${{ inputs.n || '4' }}
      CUBE_RTOL: ${{ inputs.rtol || '1e-5' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          # `setup-java` ships its own Maven cache controller; this keys
          # off the pom.xml so the ~200 MB TF-Java native pull only
          # re-downloads when dependencies actually change.
          cache: maven

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: reference/numpy/requirements.txt

      - name: Install Python deps (NumPy + SciPy)
        # The TF-Java sidecar driver and the NumPy emitter both depend
        # on numpy + scipy. We deliberately do NOT install JAX here —
        # the JAX row of the agreement table comes from the in-tree
        # `reference/fixtures/cube_cavity/jax_baseline.json` snapshot
        # (which was itself produced by JAX), so the CI job stays
        # JVM + numpy + scipy and doesn't bloat to ~1 GB.
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r reference/numpy/requirements.txt

      - name: Show toolchain versions (debug)
        run: |
          java -version
          mvn -version
          python3 --version
          python3 -c "import numpy, scipy; print('numpy', numpy.__version__); print('scipy', scipy.__version__)"

      - name: Build the TF-Java cube-cavity Maven project
        working-directory: reference/tf_java/cube_cavity
        # `-Plinux-x86_64` activates the linux-x86_64 native classifier
        # for `tensorflow-core-native`, matching the ubuntu-latest runner.
        # `-DskipTests` because the Maven project has no JUnit tests yet
        # (the validation contract is the cross-IR agreement table below,
        # not in-JVM unit tests).
        run: |
          mvn -B -Plinux-x86_64 -DskipTests package

      - name: Run TF-Java assembly → sidecar dump
        working-directory: reference/tf_java/cube_cavity
        run: |
          mkdir -p target/out
          mvn -B -Plinux-x86_64 exec:java \
              -Dexec.mainClass=dev.geodefem.refcubecavity.CubeCavityMain \
              -Dexec.args="--n ${CUBE_N} --side 1.0 --out target/out/reduced_kM.json"
          ls -lh target/out/

      - name: Run SciPy eigensolve over the TF-Java sidecar
        working-directory: reference/tf_java/cube_cavity
        run: |
          python3 ../../driver/eigensolve_from_tfjava.py \
              target/out/reduced_kM.json \
              --k 5 \
              --out target/out/eigenresult_tfjava.json
          cat target/out/eigenresult_tfjava.json

      - name: Emit NumPy reference eigenvalues for the same mesh
        run: |
          mkdir -p reference/tf_java/cube_cavity/target/out
          python3 reference/driver/emit_numpy_eigenvalues.py \
              --n "${CUBE_N}" --side 1.0 --k 5 \
              --out reference/tf_java/cube_cavity/target/out/numpy_baseline.json

      - name: Cross-IR agreement gate (TF-Java vs JAX vs NumPy, rtol=${{ env.CUBE_RTOL }})
        # This is the AC#5 hard gate: TF-Java eigenvalues must match the
        # JAX and NumPy baselines on the lowest 5 modes within `rtol`.
        # A failure here is the most-informative possible outcome — an
        # XLA-vs-XLA disagreement between TF-Java and JAX would isolate a
        # genuine compiler-semantics drift on the same algorithm. We
        # always upload the agreement table as an artifact, regardless
        # of pass/fail, so the Friction artifact stays visible.
        #
        # Burn agreement is intentionally not part of this gate; it is
        # exercised by the `arpack` workflow and by the per-push
        # `cube_cavity_jax_reference` cargo test against the same JAX
        # baseline. The `--burn` flag is therefore omitted here.
        run: |
          python3 reference/driver/compare_eigenvalues.py \
              --tfjava reference/tf_java/cube_cavity/target/out/eigenresult_tfjava.json \
              --jax    reference/fixtures/cube_cavity/jax_baseline.json \
              --numpy  reference/tf_java/cube_cavity/target/out/numpy_baseline.json \
              --k 5 \
              --rtol "${CUBE_RTOL}" \
              --out   reference/tf_java/cube_cavity/target/out/agreement_table.md

      - name: Upload TF-Java sidecar + agreement artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfjava-cube-cavity-artifacts
          path: |
            reference/tf_java/cube_cavity/target/out/reduced_kM.json
            reference/tf_java/cube_cavity/target/out/eigenresult_tfjava.json
            reference/tf_java/cube_cavity/target/out/numpy_baseline.json
            reference/tf_java/cube_cavity/target/out/agreement_table.md
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Sphere-PEC job — TF-Java Nédélec assembly + SciPy eigensolve (Issue #134)
  # ---------------------------------------------------------------------------
  sphere-pec-tfjava:
    name: TF-Java sphere-PEC Nédélec assembly + SciPy eigensolve + NumPy agreement
    runs-on: ubuntu-latest
    # Bound queue-wait + execution so this cross-check can never orphan
    # for the 24h GitHub ceiling (issue #354). JDK 17 + Maven + native
    # TF-Java libs make this heavy; 30 min leaves headroom for a cold
    # Maven cache.
    timeout-minutes: 30
    env:
      MAVEN_OPTS: "-Xmx2g"
      # Relative tolerance for the physical-eigenvalue cross-backend gate.
      # 2e-5 (not 1e-5): TF-Java scatterNd accumulates in a different order than
      # NumPy COO->CSR, producing ~1.2e-5 relative error on the lowest eigenvalue.
      # The other 4 physical modes are within 2e-7 of NumPy.  2e-5 is adequate
      # margin while still gating against gross assembly bugs.
      SPHERE_RTOL: '2e-5'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: reference/numpy/requirements.txt

      - name: Install Python deps (NumPy + SciPy + meshio)
        # The sphere-PEC driver needs numpy + scipy.
        # meshio is needed only if we use the Python path; the TF-Java assembly
        # uses its own pure-JVM MSH4 parser so meshio is NOT required for the
        # Java side.
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r reference/numpy/requirements.txt

      - name: Show toolchain versions (debug)
        run: |
          java -version
          mvn -version
          python3 --version
          python3 -c "import numpy, scipy; print('numpy', numpy.__version__); print('scipy', scipy.__version__)"

      - name: Build the TF-Java sphere-PEC Maven project
        working-directory: reference/tf_java/sphere_pec
        # `-Plinux-x86_64` activates the linux-x86_64 native classifier.
        # `-DskipTests` — no JUnit tests in the Maven project; the validation
        # contract is the cross-IR Python eigensolve gate below.
        run: |
          mvn -B -Plinux-x86_64 -DskipTests package

      - name: Run TF-Java sphere-PEC assembly → sidecar dump
        # The Java main reads sphere.msh from the path given via --mesh.
        # We pass a repo-root-relative path from the sphere_pec working dir.
        working-directory: reference/tf_java/sphere_pec
        run: |
          mkdir -p target/out
          mvn -B -Plinux-x86_64 exec:java \
              -Dexec.mainClass=dev.geodefem.refspherepec.SpherePecMain \
              -Dexec.args="--mesh ../../fixtures/sphere_pec/sphere.msh \
                           --n-index 1.5 \
                           --r-buffer 2.0 \
                           --out target/out/reduced_kM_sphere_pec.json"
          ls -lh target/out/

      - name: Run SciPy eigensolve + spurious filter + NumPy cross-check
        # The eigensolve driver reads the sidecar, runs shift-and-invert ARPACK,
        # applies the d⁰-rank spurious filter (n_spurious=368 from baseline.json),
        # and compares to reference/fixtures/sphere_pec/baseline.json.
        run: |
          python3 reference/driver/eigensolve_sphere_pec_sidecar.py \
              reference/tf_java/sphere_pec/target/out/reduced_kM_sphere_pec.json \
              --k 5 \
              --baseline reference/fixtures/sphere_pec/baseline.json \
              --rtol "${SPHERE_RTOL}" \
              --out reference/tf_java/sphere_pec/target/out/eigenresult_sphere_pec.json
          cat reference/tf_java/sphere_pec/target/out/eigenresult_sphere_pec.json

      - name: Upload sphere-PEC TF-Java artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfjava-sphere-pec-artifacts
          path: |
            reference/tf_java/sphere_pec/target/out/reduced_kM_sphere_pec.json
            reference/tf_java/sphere_pec/target/out/eigenresult_sphere_pec.json
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Sphere-PML job — TF-Java complex-Nédélec assembly + SciPy ZGGEV (Issue #156)
  # ---------------------------------------------------------------------------
  sphere-pml-tfjava:
    name: TF-Java sphere-PML complex-Nédélec assembly + SciPy ZGGEV + NumPy agreement
    runs-on: ubuntu-latest
    # Bound queue-wait + execution so this cross-check can never orphan
    # for the 24h GitHub ceiling (issue #354). JDK 17 + Maven + native
    # TF-Java libs make this heavy; 30 min leaves headroom for a cold
    # Maven cache.
    timeout-minutes: 30
    env:
      MAVEN_OPTS: "-Xmx2g"
      # Absolute tolerance for the cross-backend physical-eigenvalue gate.
      # 1e-3 matches the JAX baseline tolerance and the sphere-PML cross-IR
      # scope per the Phase H.4 issue body. NumPy is the canonical
      # tiebreaker; deviations larger than 1e-3 indicate genuine assembly
      # drift, not just cluster-ordering between solvers (which the dense
      # ZGGEV path does not exhibit — the same eigensolve is run both sides).
      SPHERE_PML_TOL: '1e-3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: reference/numpy/requirements.txt

      - name: Install Python deps (NumPy + SciPy)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r reference/numpy/requirements.txt

      - name: Show toolchain versions (debug)
        run: |
          java -version
          mvn -version
          python3 --version
          python3 -c "import numpy, scipy; print('numpy', numpy.__version__); print('scipy', scipy.__version__)"

      - name: Build the TF-Java sphere-PML Maven project
        working-directory: reference/tf_java/sphere_pml
        # `-Plinux-x86_64` activates the linux-x86_64 native classifier.
        # `-DskipTests` — no JUnit tests in the Maven project; the validation
        # contract is the cross-IR Python eigensolve gate below.
        run: |
          mvn -B -Plinux-x86_64 -DskipTests package

      - name: Run TF-Java sphere-PML complex assembly → sidecar dump
        # The Java main reads sphere.msh from the path given via --mesh.
        # The bundled sphere_pml/ mesh is identical to the sphere_pec/ one
        # (774 nodes, 3335 tets); --sigma0 5.0 matches the canonical NumPy
        # baseline (reference/fixtures/sphere_pml/baseline.json @ PR #155).
        working-directory: reference/tf_java/sphere_pml
        run: |
          mkdir -p target/out
          mvn -B -Plinux-x86_64 exec:java \
              -Dexec.mainClass=dev.geodefem.refspherepml.SpherePmlMain \
              -Dexec.args="--mesh ../../fixtures/sphere_pml/sphere.msh \
                           --sigma0 5.0 \
                           --n-index 1.5 \
                           --r-buffer 2.0 \
                           --out target/out/reduced_kM_sphere_pml.json"
          ls -lh target/out/

      - name: Run SciPy ZGGEV + spurious filter + NumPy cross-check
        # The eigensolve driver reads the sidecar, fuses the (Re(M), Im(M))
        # f64 pair into a complex128 pencil, runs dense LAPACK ZGGEV,
        # applies the d⁰-rank spurious filter (n_spurious=368 from
        # baseline.json), canonicalizes the sign to Im(λ) > 0 per PR #155,
        # and compares to reference/fixtures/sphere_pml/baseline.json.
        run: |
          python3 reference/driver/eigensolve_from_sidecar.py \
              reference/tf_java/sphere_pml/target/out/reduced_kM_sphere_pml.json \
              --backend tfjava \
              --problem sphere-pml \
              --k 5 \
              --baseline reference/fixtures/sphere_pml/baseline.json \
              --rtol "${SPHERE_PML_TOL}" \
              --out reference/tf_java/sphere_pml/target/out/eigenresult_sphere_pml.json
          cat reference/tf_java/sphere_pml/target/out/eigenresult_sphere_pml.json

      - name: Cross-check live JVM output against checked-in tfjava_baseline.json
        # The checked-in tfjava_baseline.json was regenerated via
        # `reference/tf_java/sphere_pml/gen_tfjava_baseline.py` against the
        # canonical NumPy pipeline (the TF-Java JVM path produces
        # numerically equivalent results modulo scatterNd accumulation
        # order — documented Phase G.5 PR #137 friction artifact). This
        # gate detects JVM-side drift beyond the documented tolerance.
        run: |
          python3 -c "
          import json
          import numpy as np
          live = json.load(open('reference/tf_java/sphere_pml/target/out/eigenresult_sphere_pml.json'))
          stored = json.load(open('reference/fixtures/sphere_pml/tfjava_baseline.json'))
          live_phys = np.asarray(live['outputs']['physical_eigenvalues_complex']['data'], dtype=np.float64).view(np.complex128)
          stored_phys = np.asarray(stored['outputs']['physical_eigenvalues_complex']['data'], dtype=np.float64).view(np.complex128)
          n = min(len(live_phys), len(stored_phys))
          d0 = float(np.abs(live_phys[0] - stored_phys[0]))
          max_abs = float(np.max(np.abs(live_phys[:n] - stored_phys[:n])))
          print(f'live JVM physical[0]    = {live_phys[0]}')
          print(f'stored fixture phys[0]  = {stored_phys[0]}')
          print(f'physical[0] |Δ|         = {d0:.3e}')
          print(f'per-position max |Δ|    = {max_abs:.3e} (over {n} entries)')
          tol = 1e-3
          assert d0 < tol, f'live vs stored fixture physical[0] |Δ| {d0:.3e} exceeds {tol:.0e}'
          print('PASS')
          "

      - name: Upload sphere-PML TF-Java artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfjava-sphere-pml-artifacts
          path: |
            reference/tf_java/sphere_pml/target/out/reduced_kM_sphere_pml.json
            reference/tf_java/sphere_pml/target/out/eigenresult_sphere_pml.json
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Sphere-Mie job — TF-Java TENSOR-ε complex-Nédélec assembly + SciPy ZGGEV
  # (Issue #174, Epic #88 Phase J.5)
  # ---------------------------------------------------------------------------
  sphere-mie-tfjava:
    name: TF-Java sphere-Mie tensor-ε Nédélec assembly + SciPy ZGGEV + NumPy agreement
    runs-on: ubuntu-latest
    # Bound queue-wait + execution so this cross-check can never orphan
    # for the 24h GitHub ceiling (issue #354). JDK 17 + Maven + native
    # TF-Java libs make this heavy; 30 min leaves headroom for a cold
    # Maven cache.
    timeout-minutes: 30
    env:
      MAVEN_OPTS: "-Xmx2g"
      # Absolute tolerance for the per-position physical-eigenvalue gate
      # vs the NumPy J.2 canonical baseline. 1e-4 matches the JAX / Julia
      # Mie baseline tolerance (the small 214-DOF pencil + dense ZGGEV
      # both sides leaves only scatterNd-accumulation-order drift, which
      # the Phase G.5 PR #137 measurement bounds at ~1.2e-5 relative on
      # a mesh 15x larger). The driver enforces this gate itself and
      # exits non-zero on failure (unlike sphere-pml, where the table is
      # informational).
      SPHERE_MIE_TOL: '1e-4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: reference/numpy/requirements.txt

      - name: Install Python deps (NumPy + SciPy)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r reference/numpy/requirements.txt

      - name: Show toolchain versions (debug)
        run: |
          java -version
          mvn -version
          python3 --version
          python3 -c "import numpy, scipy; print('numpy', numpy.__version__); print('scipy', scipy.__version__)"

      - name: Build the TF-Java sphere-Mie Maven project
        working-directory: reference/tf_java/sphere_mie
        # `-Plinux-x86_64` activates the linux-x86_64 native classifier.
        # `-DskipTests` — no JUnit tests in the Maven project; the validation
        # contract is the cross-IR Python eigensolve gate below.
        run: |
          mvn -B -Plinux-x86_64 -DskipTests package

      - name: Run TF-Java sphere-Mie tensor-ε assembly → sidecar dump
        # The Java main reads sphere.msh from the path given via --mesh.
        # The SMALL mesh (48 nodes, 197 tets) is shared with the #158
        # sphere_pml_small fixture; --sigma0 5.0 / --k0-ref 2.0 match the
        # canonical NumPy J.2 baseline
        # (reference/fixtures/sphere_mie_small/baseline.json @ PR #179).
        working-directory: reference/tf_java/sphere_mie
        run: |
          mkdir -p target/out
          mvn -B -Plinux-x86_64 exec:java \
              -Dexec.mainClass=dev.geodefem.refspheremie.SphereMieMain \
              -Dexec.args="--mesh ../../fixtures/sphere_pml_small/sphere.msh \
                           --sigma0 5.0 \
                           --k0-ref 2.0 \
                           --n-index 1.5 \
                           --r-buffer 2.0 \
                           --out target/out/reduced_kM_sphere_mie.json"
          ls -lh target/out/

      - name: Run SciPy ZGGEV + spurious filter + NumPy hard gate
        # The eigensolve driver reads the sidecar, fuses the (Re(M), Im(M))
        # f64 pair into a complex128 pencil, runs dense LAPACK ZGGEV,
        # applies the d⁰-rank spurious filter (n_spurious=31 from
        # baseline.json), applies NO sign canonicalization (physical
        # Im(λ) < 0 is a property of the small-mesh tensor pencil), and
        # hard-gates per-position agreement vs the NumPy J.2 canonical
        # baseline at ${SPHERE_MIE_TOL} absolute (driver exits non-zero
        # on failure).
        run: |
          python3 reference/driver/eigensolve_from_sidecar.py \
              reference/tf_java/sphere_mie/target/out/reduced_kM_sphere_mie.json \
              --backend tfjava \
              --problem sphere-mie \
              --k 5 \
              --baseline reference/fixtures/sphere_mie_small/baseline.json \
              --rtol "${SPHERE_MIE_TOL}" \
              --out reference/tf_java/sphere_mie/target/out/eigenresult_sphere_mie.json
          cat reference/tf_java/sphere_mie/target/out/eigenresult_sphere_mie.json

      - name: Cross-check live JVM output against checked-in tfjava_baseline.json
        # The checked-in tfjava_baseline.json was generated via
        # `reference/tf_java/sphere_mie/gen_tfjava_baseline.py` against the
        # canonical NumPy pipeline (the TF-Java JVM path produces
        # numerically equivalent results modulo scatterNd accumulation
        # order — documented Phase G.5 PR #137 friction artifact). This
        # gate detects JVM-side drift beyond the documented tolerance,
        # per-position over the whole physical band (the Mie chain has no
        # conjugate freedom — both sides carry Im(λ) < 0 natively).
        run: |
          python3 -c "
          import json
          import numpy as np
          live = json.load(open('reference/tf_java/sphere_mie/target/out/eigenresult_sphere_mie.json'))
          stored = json.load(open('reference/fixtures/sphere_mie_small/tfjava_baseline.json'))
          live_phys = np.asarray(live['outputs']['physical_eigenvalues_complex']['data'], dtype=np.float64).view(np.complex128)
          stored_phys = np.asarray(stored['outputs']['physical_eigenvalues_complex']['data'], dtype=np.float64).view(np.complex128)
          n = min(len(live_phys), len(stored_phys))
          deltas = np.abs(live_phys[:n] - stored_phys[:n])
          max_abs = float(np.max(deltas))
          print(f'live JVM physical[0]    = {live_phys[0]}')
          print(f'stored fixture phys[0]  = {stored_phys[0]}')
          print(f'per-position max |Δ|    = {max_abs:.3e} (over {n} entries)')
          tol = 1e-4
          assert max_abs < tol, f'live vs stored fixture per-position max |Δ| {max_abs:.3e} exceeds {tol:.0e}'
          print('PASS')
          "

      - name: Upload sphere-Mie TF-Java artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfjava-sphere-mie-artifacts
          path: |
            reference/tf_java/sphere_mie/target/out/reduced_kM_sphere_mie.json
            reference/tf_java/sphere_mie/target/out/eigenresult_sphere_mie.json
          if-no-files-found: warn
          retention-days: 30
