# Coarse smoke-test variant of the 3.5-turn square spiral (issue #210).
#
# Same topology and layer stack as spiral_3p5_generic.yaml, but with a
# smaller footprint (d_in 40), tighter margins and coarser sizing so the
# end-to-end driven_solve_with_ports smoke test stays affordable for the
# CURRENT dense Burn scatter assembly, which materializes a flat
# [n_edges^2] tensor with i32 linear indices (n_edges <= 46_340 hard cap,
# memory ~ 4 * n_edges^2 bytes per tensor). The full benchmark fixture
# (spiral_3p5_generic.yaml, ~54 k edges) is committed for the issue-#211
# benchmarks and needs a sparse assembly path before it can be solved.

name: spiral_3p5_smoke

spiral:
  n_turns: 3.5
  w: 6.0
  s: 4.0
  d_in: 40.0
  g: 4.0
  feed_len: 12.0
  stub_len: 8.0

stack:
  h_sub: 18.0
  h_ox: 12.0
  z1_bot: 2.0
  t1: 2.0
  z2_bot: 6.5
  t2: 3.0
  h_air: 12.0
  h_buf: 8.0
  margin: 18.0

mesh:
  lc_cond: 7.0
  lc_port: 2.5
  lc_far: 26.0
  dist_far: 24.0

# Materials identical to spiral_3p5_generic.yaml.
materials:
  substrate_eps_r: 11.9
  substrate_tan_delta: 0.005
  dielectric_eps_r: 4.0
  dielectric_tan_delta: 0.001
  conductor_sigma_s_m: 5.8e7
