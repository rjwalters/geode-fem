# Rectangular metallic waveguide cross-section fixture for the Phase-1
# transverse modal eigensolver (Epic #234, issue #235).
#
# Phase 1 uses an **in-memory programmatic mesh** generated by
# `geode_core::waveguide_modes::rect_tri_mesh(nx, ny, a, b)` — no gmsh
# offline step is needed for a structured rectangle. This file is the
# committed parameter / provenance record for the fixture, mirroring the
# existing `reference/gmsh/*.yaml` pattern for the patch and spiral
# fixtures.
#
# Phase 2 (#236) will swap this in-memory generator for a gmsh-generated
# triangle mesh when we need to evaluate the wave-port BC on real
# microstrip-line / CPW cross-sections that do not admit a structured
# tensor-product mesh.

waveguide:
  name: rect_te10                # WR-90-aspect rectangle, a:b = 2:1
  a: 2.0                         # inner width  (length units)
  b: 1.0                         # inner height (length units)
  walls: PEC                     # metallic (Dirichlet on e_t × n)

mesh:
  generator: rect_tri_mesh       # geode_core::waveguide_modes::rect_tri_mesh
  nx: 16                         # quads along x
  ny: 8                          # quads along y
  triangles_per_quad: 2          # right-handed split sharing diagonal (i,j)→(i+1,j+1)
  n_nodes: 153                   # (nx+1)*(ny+1)
  n_tris: 256                    # 2 * nx * ny
  n_edges: 425                   # nx*(ny+1) + (nx+1)*ny + nx*ny

# Analytic oracle (TE_mn / TM_mn cutoffs k_c = sqrt((m*pi/a)^2 + (n*pi/b)^2)):
oracle:
  TE10_kc: 1.5707963267948966    # pi / a
  TE20_kc: 3.141592653589793     # 2 pi / a
  TE01_kc: 3.141592653589793     # pi / b  (== TE20 for a/b = 2 — degenerate)
  TM11_kc: 3.5124074613103436    # sqrt((pi/a)^2 + (pi/b)^2)

# Achieved errors (Phase-1 acceptance test
# `tests/rect_waveguide_modes.rs::rect_waveguide_modal_spectrum_matches_analytic`,
# 16x8 mesh, dense `faer::generalized_eigen` pencil eigensolver):
achieved:
  TE10_rel_err: 0.00054          # 0.05 %
  TE20_TE01_rel_err: 0.0022      # 0.22 % (degenerate pair)
  TM11_rel_err: 0.0001           # 0.01 %

provenance:
  epic: 234
  phase: 1
  issue: 235
  date: "2026-06-14"
