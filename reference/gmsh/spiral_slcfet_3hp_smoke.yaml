# Coarse smoke-test variant of the SLCFET 3HP 3-turn square spiral
# (issue #212).
#
# Same topology, layer stack, and materials as spiral_slcfet_3hp.yaml,
# but with a smaller footprint (d_in 60), a thinner substrate slab,
# tighter margins and coarser sizing so the end-to-end
# driven_solve_with_ports smoke test stays affordable in default CI.
# The full benchmark fixture (spiral_slcfet_3hp.yaml) is solved by the
# #[ignore]d acceptance test and the benchmark example only.

name: spiral_slcfet_3hp_smoke

spiral:
  n_turns: 3.0
  w: 10.0
  s: 5.0
  d_in: 60.0
  g: 4.0
  feed_len: 12.0
  stub_len: 10.0

stack:
  h_sub: 30.0        # thinned SiC slab (full fixture: 100)
  h_ox: 10.0
  z1_bot: 0.0
  t1: 3.0
  z2_bot: 5.0
  t2: 2.25
  h_air: 14.0
  h_buf: 10.0
  margin: 25.0

mesh:
  lc_cond: 9.0
  lc_port: 3.0
  lc_far: 30.0
  dist_far: 28.0

# Materials identical to spiral_slcfet_3hp.yaml.
materials:
  substrate_eps_r: 9.7
  substrate_tan_delta: 0.004
  dielectric_eps_r: 1.0
  dielectric_tan_delta: 0.0
  conductor_sigma_s_m: 5.1467e7
