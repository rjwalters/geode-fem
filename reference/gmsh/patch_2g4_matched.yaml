# 2.4 GHz rectangular microstrip patch antenna on FR-4, tuned for a
# real 50 ohm match (issue #237). Same topology as
# patch_2g4_benchmark.yaml — only the probe inset is changed
# (probe_inset 8.0 -> 7.0 mm) so the coax-probe lumped port is
# impedance-matched to 50 ohm at the patch's TM010 resonance and the
# return-loss sweep reaches |S11| <= -10 dB with a bracketable -10 dB
# fractional bandwidth. The Phase-2 fixture (patch_2g4.msh) is retained
# because the Phase-3 NTFF/pattern.toml is keyed to it.
#
# Empirical tuning: a probe inset of 7.0 mm gives a -15 dB return-loss
# dip at f_res ~= 2.27 GHz (Phase 2 returned -6 dB at 8.0 mm); deeper
# insets shrink the input resistance below 50 ohm and the dip shallows
# out again (5.0 mm hit -9.7 dB, 6.0 mm hit -11.8 dB, 7.0 mm hit
# -15.2 dB). The cavity-model two-slot R_in(0) is ~301 ohm, so the cos^2
# Balanis 14-20a taper alone would predict ~9-10 mm; the FEM coax-probe
# feed adds inductive loading that shifts the matched inset inward.

name: patch_2g4_matched

patch:
  patch_w: 38.0       # patch width  (x extent)
  patch_l: 29.0       # patch length (y extent)
  h: 1.6              # FR-4 substrate thickness
  sub_pad: 12.0       # substrate margin beyond the patch
  probe_w: 1.6        # coax-probe footprint side
  probe_inset: 7.0    # tuned feed inset (~50 ohm match, issue #237)

domain:
  air_margin: 60.0    # air gap to the PML (~lambda/2 at 2.4 GHz)
  pml_thick: 25.0     # matched-UPML shell thickness

mesh:
  lc_patch: 4.5       # target size on the patch/substrate top face
  lc_sub: 1.6         # in-slab size (~ substrate thickness, anti-sliver)
  lc_port: 1.2        # target size at the probe gap
  lc_far: 28.0        # far-field size (air/UPML)
  dist_far: 40.0      # distance over which size grows to lc_far

materials:
  substrate_eps_r: 4.4         # FR-4
  substrate_tan_delta: 0.02
  conductor_sigma_s_m: 5.8e7   # copper (PEC in Phase 1; recorded for
#                                Phase 2 Leontovich loss work)
