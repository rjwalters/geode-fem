[package]
name = "geode-core"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "GEODE-FEM solver primitives: tensor ops over Burn."

[dependencies]
burn = { workspace = true }
faer = { version = "0.24", default-features = false, features = ["std", "linalg"] }
mshio = "0.4"
thiserror = "2"

[features]
default = ["wgpu"]
wgpu = ["burn/wgpu"]
cuda = ["burn/cuda"]
# Autodiff backend wrapper — opt-in (gradient tests / inverse design).
autodiff = ["burn/autodiff"]

[dev-dependencies]
geode-core = { path = ".", features = ["autodiff"] }
# Read regression-fixture TOML in `tests/cube_convergence_regression.rs`.
toml = "0.8"

[lints.rust]
unsafe_code = "forbid"
