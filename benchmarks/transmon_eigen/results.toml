# Transmon + readout-resonator eigenmode benchmark (Epic #476 Phase B,
# issue #492). Junction modeled as a lumped reactive shunt (L ∥ C) on the
# `lumped_element` surface; real symmetric pencil solved with the
# shift-invert Lanczos. Cross-validated against Palace on the IDENTICAL
# mesh at matched (first) order.
#
# Consumed by `crates/geode-core/tests/transmon_eigenmode.rs`
# (`real_transmon_eigenmodes_release`, `#[ignore]` release tier). The
# geode-fem numbers below are regenerated by that test; the
# [oracles.palace] block is populated from a real Palace run committed
# under reference/fixtures/transmon_palace/results_p1/.

[meta]
description = "Transmon eigenmode: Josephson junction as a lumped reactive shunt (L = 14.860 nH ∥ C = 5.5 fF) on the lumped_element surface of the real DeviceLayout.jl v1.15.0 SingleTransmon mesh; PEC on metal + exterior; readout ports open (lossless v1). Real symmetric pencil (K + K_port) x = ω² (M + M_port) x solved with shift-invert Lanczos. Cross-validated against Palace on the identical mesh at matched first order."
fixture = "crates/geode-core/tests/fixtures/transmon_smoke.msh"
fixture_provenance = "crates/geode-core/tests/fixtures/transmon_smoke.provenance.txt"
fixture_sha256 = "5b3ff4c357a4dc905e7a2e42abc8178778b626e47582c7bbe610f95d332b33dd"
n_nodes = 22684
n_tets = 133314
n_nedelec_dofs = 156863
n_interior_dofs = 133108
mesh_length_unit = "micrometre"
junction_inductance_nh = 14.860
junction_capacitance_ff = 5.5
solver = "SparseShiftInvertLanczos (real, faer sparse LU)"
assembly = "sparse full-tensor Nédélec (Re parts; imag ≈ 0, lossless sapphire), K_port/M_port surface triplets added, interior reduction"
notes = [
  "Junction participation p = (xᵀ K_port x) / (xᵀ (K + K_port) x): the junction LC mode has p ≈ 1, all cavity modes p ≈ 0.",
  "The junction LC self-resonance f_LC = 1/(2π√(LC)) = 17.60 GHz; the p ≈ 1 mode at 17.49 GHz is that physical junction mode.",
  "A spurious junction-surface-localized mode appears near 3.45 GHz below the physical band: geode-fem's Lanczos lacks the divergence-free projection Palace applies, so a gradient-nullspace-adjacent mode leaks in. It is NOT a physical mode (absent from Palace's spectrum) and is filtered by comparing against the committed oracle. Removing it is a follow-on (a div-free / tree-cotree gauge on the eigen path); it does not affect the physical-mode cross-validation.",
  "Readout ports port_1/port_2 left OPEN (lossless v1); their 50 Ω would make the pencil complex (lossy Q), which is out of scope v1.",
  "Blog sanity band [4.14, 5.591] GHz (non-gating): the resonator mode 5.15 GHz sits ~7.9% below the 5.591 GHz blog resonator; mesh/order/junction-geometry differ from the blog's exact runs. The GATE is Palace-same-mesh, met at ≤0.04%.",
]

