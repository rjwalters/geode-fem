[comparison]
# Bar: both physical modes within ≤1% of Palace on the identical mesh at
# matched order. MET — worst-case per-mode delta 0.032% (25× inside the bar).
bar_pct = 1.0
worst_case_rel_err_pct = 0.032
all_physical_modes_within_bar = true

# Measured values behind the paper's tripwire + spurious-mode claims
# (Epic #476, measured 2026-07-14). Committed here so every paper number
# traces to a committed artifact.
[tripwires.junction_l_doubling]
# tripwire_real_junction_l_doubling: doubling the junction inductance L
# shifts the p ≈ 1 junction LC mode DOWN by the √L scaling (f ∝ 1/√(LC),
# so 2L → 1/√2 ≈ 0.7071). Measured on the real 157k-DOF fixture.
base_f_ghz = 17.4901
doubled_f_ghz = 12.37
ratio = 0.7071          # = 1/√2 (√L scaling), matches within slack
prediction = 0.70710678 # 1/√2
test = "crates/geode-core/tests/transmon_eigenmode.rs::tripwire_real_junction_l_doubling"

[spurious_mode]
# A junction-surface-localized mode below the physical band: geode-fem's
# real Lanczos lacks the divergence-free projection Palace applies, so a
# gradient-nullspace-adjacent mode leaks in. It has NO Palace counterpart
# and is EXCLUDED from the physical set (and from the ≤1% gate). Its high
# geode-fem stiffness-participation is exactly why participation alone
# cannot identify physical modes — frequency-matching against the Palace
# oracle is what filters it out.
f_ghz = 3.4528
participation = 0.9942  # geode-fem stiffness-participation (spurious, excluded)
excluded = true
# Tree-cotree gauge attempt (issue #502, measured 2026-07-14): a
# spanning-tree DOF-elimination gauge (crate::eigen::gauge::TreeCotreeGauge)
# was implemented and shown to remove exactly rank(d⁰_interior) = 13747
# gradient DOFs from the 133108-DOF interior pencil (count == de-Rham
# gradient dimension, proven on cube fixtures). HOWEVER, DOF elimination
# (dropping tree rows/cols of BOTH K and M) is a *source*-problem gauge and
# is NOT spectrum-preserving for the generalized eigenproblem K x = λ M x:
# the physical eigenvectors have nonzero tree-edge components, so the
# constraint x_tree = 0 SHIFTS the computed spectrum. Measured: the
# resonator drifts to 5.2372 GHz (1.64%, OUTSIDE the ≤1% bar; a converged
# eigenvalue, stable across k=4/12/24 Krylov vectors), and a dense low
# cluster persists. The spurious mode is therefore NOT removed by
# tree-cotree DOF elimination; it is still filtered by frequency-matching
# (the committed benchmark path is unchanged). The spectrum-preserving fix
# is a divergence-free projection (Zᵀ K Z, Zᵀ M Z), for which the shipped
# spanning tree supplies the cotree basis — the #502 follow-on landed as
# issue #509 (this projection); its own port-aware follow-on is issue #514.
gauged = false  # tree-cotree DOF elimination does not remove it (see note)
tree_cotree_gradient_dofs = 13747  # == rank(d⁰_interior) on this mesh
tree_cotree_resonator_drift_pct = 1.64  # gauged 5.2372 vs ungauged 5.1528 GHz
# Divergence-free projection attempt (issue #509, measured 2026-07-14): the
# spectrum-preserving M-orthogonal projector P = I − G(GᵀMG)⁻¹GᵀM with
# G = d⁰_interior (the sparse interior-restricted discrete gradient) was
# implemented (crate::eigen::projection) and factored once (GᵀMG is a
# 13747²-node SPD sparse LU, an order below the 133108-DOF edge pencil).
# UNLIKE tree-cotree DOF elimination, the projection PRESERVES the cavity
# spectrum: the 5.1513 GHz Palace resonator reproduces at 5.1528 GHz
# (0.029%, vs the DOF-elimination gauge's 1.64% shift) and every returned
# Ritz vector is divergence-free to machine level (‖GᵀMx‖/‖x‖_M ≈ 1e-15).
# The dense image(d⁰) near-zero cluster (13747 modes at λ≈0) collapses to at
# most ONE near-zero survivor. HOWEVER, the bulk-d⁰ projection is
# INCOMPATIBLE with the lumped-inductor eigenmode formulation on TWO counts,
# both root-caused and pinned in
# tests/transmon_eigenmode.rs::real_transmon_projection_deflates_junction_mode:
#   1. The spurious 3.4528 GHz mode SURVIVES — its eigenvector is genuinely
#      divergence-free (div-ratio ≈ 6e-15), so it is a port-localized
#      near-nullspace mode of (K + K_port, M + M_port), NOT a bulk-gradient
#      artifact, and is M-orthogonal to image(d⁰_interior) → untouched by P.
#   2. The physical junction LC mode (17.4901 GHz, p = 1) is DEFLATED AWAY.
#      A lumped inductor is a quasi-static, curl-free flux path, so the
#      junction LC eigenmode is itself a (near-)gradient field living largely
#      in image(d⁰_interior); the bulk projection cannot distinguish it from
#      a spurious gradient mode and removes both. Targeting σ AT 17.49 GHz:
#      ungauged resolves 17.4901 GHz (p = 1.0000), projected does not return
#      it (nearest 18.6927 GHz, 6.88%).
# The spectrum-preserving half is achieved (cavity modes, gradient cluster);
# retaining the junction mode AND removing the solenoidal port-spurious mode
# requires a PORT-AWARE projection (exclude the junction-surface gradient
# directions from G, matching Palace's LumpedPort handling) — filed as the
# follow-on, issue #514 ("Port-aware divergence-free projection — eigen-gauge
# saga, chapter 3"). The committed benchmark path (ungauged +
# frequency-filtering) is unchanged.
#
# DEFLATION MECHANISM (measured directly on the raw UNGAUGED junction
# eigenvector, 2026-07-14): the ModeReport path drops EigenPair.vector, so the
# ungauged junction eigenvector is obtained via
# crate::eigen::projection::ungauged_mode_divergences and measured against the
# SAME M-orthogonal projector P = I − G(GᵀMG)⁻¹GᵀM. It is a NEAR-GRADIENT
# field — its divergence ratio ‖GᵀMx‖/‖x‖_M = 5.0173e1 (macroscopic, O(10)),
# in stark contrast to the spurious mode's solenoidal 6.18e-15 — and P
# deflates it: the projected M-norm ‖Px‖_M/‖x‖_M = 1.0638e-4 ≈ 0 (the mode
# lives almost entirely in image(d⁰_interior)). This is the load-bearing
# measurement behind the "junction LC mode is deflated" negative, pinned in
# real_transmon_projection_deflates_junction_mode.
projection_gauged = false  # bulk-d⁰ div-free projection does not remove it (see note)
projection_survives_divergence_free = true  # spurious mode is solenoidal (div-ratio ≈ 6e-15)
projection_cavity_resonator_pct = 0.029  # cavity spectrum PRESERVED (vs DOF-elim 1.64%)
projection_junction_mode_deflated_pct = 6.88  # junction LC mode removed (ungauged 0.00%)
projection_junction_divergence_ratio = 5.0173e1  # ‖GᵀMx‖/‖x‖_M of the UNGAUGED junction eigenvector (near-gradient; spurious mode = 6.18e-15)
projection_junction_projected_norm_ratio = 1.0638e-4  # ‖Px‖_M/‖x‖_M ≈ 0 → P deflates the junction mode
followon_issue = 514  # Port-aware divergence-free projection — eigen-gauge saga, chapter 3
#
# PORT-AWARE PROJECTION — issue #514 CLEAN POSITIVE (measured 2026-07-14):
# construction (b2), deflate image(d⁰) ⊖ span{û}. The bulk projector deflates
# the junction LC mode because that mode is 99.99% gradient (projected-norm
# ratio 1.0638e-4 above); the port-aware projector re-admits exactly that one
# direction with a rank-1 M-orthogonal update:
#   P' = P + û ûᵀ M,   û = (I−P)x_junction / ‖(I−P)x_junction‖_M,
# where x_junction is the ungauged junction eigenvector (extracted by a small
# ungauged shift-invert solve near 17.49 GHz; participation-selected). P' is a
# genuine M-orthogonal projector onto (divergence-free subspace) ⊕ span{û}:
# identity on the cavity modes AND on the junction flux direction, annihilator
# of the other 13,746 gradient directions (algebra unit-tested in
# eigen::projection: port_aware_projector_readmits_one_gradient_direction,
# port_aware_solve_retains_the_gradient_mode). This is a COMPOSITE solver (one
# ungauged extract + one port-aware band solve), shipped via
# crate::eigen::projection::solve_transmon_eigenmodes_port_aware. Pinned in
# tests/transmon_eigenmode.rs::real_transmon_port_aware_retains_all_six_modes.
#
# RESULT — ALL SIX physical modes ≤1% INCLUDING the junction, gradient cluster
# gone (1 near-zero survivor, down from 13,747), both prior-negative pin tests
# (#502, #509) green and unmodified:
port_aware_solver = "solve_transmon_eigenmodes_port_aware (composite: ungauged junction extract + port-aware band Lanczos with P' = P + û ûᵀ M)"
port_aware_all_six_modes_within_bar = true
port_aware_worst_case_rel_err_pct = 0.0289  # worst of the six (mode 5.15 GHz)
port_aware_junction_retained_pct = 0.0000   # 17.4901 GHz, p = 1.000 — the #509 negative FLIPPED
port_aware_gradient_cluster_near_zero_modes = 1  # 13,747-mode cluster removed
port_aware_junction_divergence_ratio = 5.017e1  # the retained junction mode's div-ratio (O(1), re-admitted gradient flux — expected, NOT a defect)
#
# 3.4528 GHz SPURIOUS-MODE CHARACTERIZATION — issue #514 (measured 2026-07-14,
# tests/transmon_eigenmode.rs::characterize_spurious_3p45_mode). Two
# discriminating measurements settle its nature:
#   1. L-SCALING (the port-artifact discriminator): applying the L-doubling
#      harness (solve_real_fixture_with_l) to the SPURIOUS mode, doubling the
#      junction inductance L shifts it 3.4528 → 2.4449 GHz, ratio 0.7081 —
#      essentially the junction √L law 1/√2 = 0.7071 (a box/mesh mode would
#      stay FIXED, ratio 1.0000). The mode is therefore L-SENSITIVE: it is
#      driven by the reactive port term K_port = (ℓ/(w·L̃))·S_Γ, a genuine
#      port/junction artifact, NOT a box mode.
#   2. LOCALIZATION: stiffness-participation p = 0.9942 — ~99.4% of the mode's
#      stiffness energy sits in the K_port surface term (near-total junction-
#      patch localization).
# MECHANISM (narrowed): the 3.4528 GHz mode is a SECOND LC-like resonance of
# the S_Γ port surface operator — a K_port-driven, junction-localized eigenmode
# obeying the same 1/√L law as the physical junction LC mode, with no
# cavity/box counterpart. Palace's LumpedPort formulation represents the port
# DOFs differently (eliminated port unknowns vs. our S_Γ surface term added to
# the full-space K), so this surface-operator eigenmode has NO Palace analogue —
# which is exactly why it is absent from Palace's spectrum. It is genuinely
# solenoidal (div-ratio ≈ 6e-15), so NO divergence-free projection (bulk OR
# port-aware) removes it; it remains filtered by frequency-matching against the
# Palace oracle, unchanged.
spurious_l_scaling_base_f_ghz = 3.4528
spurious_l_scaling_doubled_f_ghz = 2.4449
spurious_l_scaling_ratio = 0.7081        # ≈ 1/√2 = 0.7071 (junction √L law; box mode would be 1.0000)
spurious_l_scaling_verdict = "L-sensitive port/junction artifact (K_port-driven surface-operator LC resonance), NOT a box/mesh mode"
spurious_localization_participation = 0.9942  # ~99.4% stiffness energy in K_port surface term

