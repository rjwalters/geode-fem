notes = [
  "Z = V/I at the lumped port (Palace-style uniform port, V_inc = 1, R = 50 ohm); L = Im Z / omega, Q = Im Z / Re Z, S11 vs 50 ohm.",
  "Conductor loss via the Leontovich good-conductor surface impedance on the cavity walls (copper, sigma = 5.8e7 S/m); substrate/oxide loss via tan-delta in the recorded permittivities.",
  "Leontovich validity caveat: below ~0.5 GHz the copper skin depth (6.6 um at 0.1 GHz) exceeds the 3 um trace thickness, so the semi-infinite-conductor surface impedance underestimates R (below the ~1.2 ohm DC resistance) and overestimates the internal inductance (the L upturn of the lowest points). The low-frequency L reference for the oracle comparison is the 1 GHz point.",
  "Mohan expressions assume an isolated spiral: no PEC box (the fixture's PEC walls reduce L via image currents and add shunt C) and no feed stubs/underpass — a sanity band, not a 5%-grade oracle.",
  "mom PEEC baseline: reference/fixtures/spiral_mom/ (integer-turn brackets n = 3 / n = 4 around the 3.5-turn fixture; matching generic stack). The FEM SRF (~21 GHz, a parallel anti-resonance: Im Z crosses zero through the |Z| peak visible at the 30 GHz point) has no mom counterpart below 40 GHz — the PEC side walls (45 um margin) and full 3D capacitance of the FEM domain are absent from mom's laterally open model.",
  "Q model spread: mid-band FEM Q exceeds the mom-bracket Q by ~3-5x. mom's 3-filament lateral discretization (2 um filaments) cannot resolve the sub-um skin depth above ~2 GHz and overestimates R there, while the FEM Leontovich surface underestimates R below ~1 GHz; the epic's factor-2 Q target is not met by this oracle pair — documented, see the PR for issue #211.",
