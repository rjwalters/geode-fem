# ===========================================================================
# ASSEMBLY STRONG-SCALING (issue #522, follow-on to #518).
# ===========================================================================
# #518 landed rayon on the faer sparse-LU *factorization* but a same-box
# head-to-head showed ~0 wall-clock speedup at the physical target: the
# factorization is not the on-target bottleneck. Profiling the host side of
# the 133k-DOF transmon pencil (identical fixture) located the two serial
# assembler hotspots — `NedelecScatterMap::new`'s sparsity-pattern build and
# its O(n_elem·36) pattern-slot binary-search loop (~0.4 s + ~0.35 s serial).
# Issue #522 parallelizes BOTH with rayon (a sort/dedup pattern build + a
# per-element `flat_map_iter` slot loop), driven through the SAME
# `GEODE_NUM_THREADS` knob (`resolve_num_threads`) and a scoped per-call
# thread pool so the thread count is a hard cap at every level.
#
# The numbers below are the assembler-phase build (`NedelecScatterMap::new`,
# i.e. pattern + slot loop) in isolation, median of 5 release-build runs on
# the identical sha-pinned transmon fixture. This is a DIFFERENT box from the
# [matched.*] m6i.4xlarge tables above (a 28-core Apple M3 Ultra), so these
# times are NOT directly comparable to the m6i wall-clock figures — they are a
# self-consistent strong-scaling curve (speedup = t(1thread)/t(nthread)),
# same box/session across all thread counts.
[strong_scaling_522]
phase = "host-side FEM assembly (NedelecScatterMap::new = sparsity pattern build + per-(e,i,j) slot binary-search loop)"
measured_date = "2026-07-15"
mesh = "the sha-pinned transmon fixture (crates/geode-core/tests/fixtures/transmon_smoke.msh)"
n_tets = 133314
n_interior_dofs = 133108
pencil_nnz = 2561711
runs = 5
statistic = "median wall (std::time::Instant) of 5 release-build runs, same box/session"
knob = "GEODE_NUM_THREADS via resolve_num_threads(); scoped rayon ThreadPool of exactly N workers per call (N=1 → single-worker pool, genuinely serial)"
determinism = "the parallel pattern (sort+dedup) and slot loop (order-preserving flat_map_iter) emit bit-for-bit identical integer index vectors at any thread count — no floating-point reduction — so the assembled [nnz] K/M values and the eigenvalues are unchanged (gated by tests::assembly_agrees_across_thread_counts and the nedelec.rs serial-vs-parallel unit tests)."

  [strong_scaling_522.hardware]
  machine = "Apple M3 Ultra"
  physical_cores = 28
  memory_gb = 96
  os = "macOS 26.5.1 (25F80)"

  [strong_scaling_522.threads_1]
  threads = 1
  assembly_s = 0.494
  speedup = 1.00

  [strong_scaling_522.threads_2]
  threads = 2
  assembly_s = 0.277
  speedup = 1.78

  [strong_scaling_522.threads_4]
  threads = 4
  assembly_s = 0.157
  speedup = 3.14

  [strong_scaling_522.threads_8]
  threads = 8
  assembly_s = 0.082
  speedup = 6.01

# ---- Triangular-solve investigation → DOCUMENTED NEGATIVE (AC-sanctioned). --
# The shift-invert inner loop applies (K−σM)^{-1} once per Krylov step via a
# single-RHS forward/back substitution on the faer LU factors (`solve_with_lu`
# in eigen/lanczos.rs). #518's design notes already flagged rayon as slower
# there for a single RHS, and #518's guard deliberately reverts to serial for
# this loop. Issue #522 MEASURES it directly: factor A = K + M (the exact
# shifted-pencil structure at σ = −1, SPD/nonsingular so sp_lu is clean) from
# the same 133k-DOF fixture, then time one `lu.solve_in_place` for a single
# RHS under serial vs rayon(8) global parallelism (median of 50 solves).
# Result: rayon REGRESSES the single-RHS solve ~1.85× (latency-bound; the
# forward/back substitution is inherently sequential per column and the outer
# full-reorthogonalization Lanczos recurrence — each v_{j+1} depends on w_j —
# cannot be RHS-batched without restructuring, which is out of scope). This is
# the honest documented negative the AC permits.
[strong_scaling_522.triangular_solve]
investigated = true
outcome = "documented negative — rayon regresses the single-RHS triangular solve"
matrix = "A = K + M from the sha-pinned transmon fixture (σ = −1 shifted-pencil structure), n = 156863, nnz = 2561711"
statistic = "median of 50 single-RHS lu.solve_in_place calls, release build, same box/session"
serial_ms = 102.0
rayon8_ms = 188.8
rayon_slowdown_x = 1.85
reason = "single-RHS forward/back substitution is latency-bound; faer 0.24 exposes no per-call Par for the triangular solve; the sequential Lanczos recurrence forbids RHS-batching without restructuring (out of scope). The eigensolve keeps this loop serial (the #518 ParallelismGuard scopes rayon to sp_lu only)."

[notes]
# --- Target-sensitivity finding (FIRST-CLASS RESULT, issue #523 scope 2) -----
# geode's direct sparse-LU shift-invert is TARGET-INSENSITIVE: the cost of a
# single sparse factorization at the shift does not depend on how far the
# target sits from a "good" operating point, so moving 6@4.5GHz → 12@20GHz
# barely changes geode's wall time (28.7 s → 36.8 s at 1 core; 29.0 s →
# 26.6 s at 8 threads). Palace's iterative Krylov+AMS DEGRADES far off-target:
# a poorly-placed shift slows convergence, so Palace's wall time balloons
# (130.9 s → 248 s at np1; 44.5 s → 64.7 s at np8). This is why the geode
# advantage WIDENS off-target (Palace/geode ≈ 6.7× serial and ≈ 2.4× at
# 8-wide off-target, vs a more modest on-target gap) rather than being a
# fixed multiplier.
target_sensitivity = "geode direct sparse-LU shift-invert is target-insensitive (factorization cost independent of target placement); Palace iterative Krylov+AMS degrades far off-target (slower convergence at a poorly-placed shift). Hence the off-target gap (≈2.4-6.7×) exceeds the on-target gap."

# --- Memory/speed crossover (FIRST-CLASS RESULT, issue #523 scope 3) ---------
# geode's DIRECT factorization trades memory for speed + target-insensitivity:
# it is faster wall-clock on small–medium problems (28.7 s on 1 core beats
# Palace's 44.5 s on 8 ranks at 133k DOF), but its factorization fill-in grows
# super-linearly and hits a HARD MEMORY WALL — at ~1.16M interior DOF it OOMs
# on a 61 GB box (63.9 GB peak, exit 137). Palace's ITERATIVE solver scales
# with low, roughly rank-flat memory (~4 GB/rank at 1.16M DOF) and completes
# (423 s, np8), just slower on the small case. geode's advantage is therefore
# SCALE-BOUNDED. The geode scale path (to remove the memory wall, NOT to beat
# Palace's wall time) is the matrix-free eigensolver (#524) plus an AMS-style
# H(curl) preconditioner (#526) — an iterative inner solve that avoids the
# direct-factorization fill-in.
memory_speed_crossover = "geode direct factorization is faster small–medium (28.7 s/3.1 GB @ 133k DOF beats Palace 44.5 s @ 8 ranks) but OOMs at ~1.16M DOF (63.9 GB peak, exit 137 on a 61 GB box); Palace iterative scales with low per-rank memory (~4 GB/rank) and completes (423 s). Crossover is memory-bound. geode scale path: matrix-free eigensolver (#524) + AMS H(curl) preconditioner (#526)."

# --- Per-core efficiency reading (honest, not a headline claim) --------------
#   At the physical target (6 modes @ 4.5 GHz), matched session:
#     geode 1 thread   28.7 s  (28.7 core-s)
#     geode 8 threads  29.0 s  (~no speedup — see #518)
#     Palace np1      130.9 s
#     Palace np8       44.5 s  (356.0 core-s)
#   geode on ONE core (28.7 s) beats Palace on EIGHT ranks (44.5 s) in absolute
#   wall clock, and consumes ~12× fewer core-seconds (28.7 vs 356) — expressed
#   as a per-core-efficiency win, NOT a "we parallelized better" claim (geode's
#   8-thread run gives ~no speedup at the physical target; see #518).
per_core_efficiency = "At the physical target, geode serial (1 core, 28.7 s) beats Palace on 8 ranks (44.5 s) in absolute wall clock; geode consumes ~12× fewer core-seconds. This is a per-core-efficiency + direct-vs-iterative result, NOT a parallelization claim — geode 8-thread gives ~no speedup at the physical target (#518)."

# --- Architecture trade-off (the honest framing, NOT a winner declaration) ---
architecture = "geode-fem: DIRECT sparse-LU shift-invert Lanczos — high per-core throughput, target-insensitive, single-process memory that grows with factorization fill-in (3.1 GB @ 133k DOF → OOM @ ~1.16M DOF). Palace: DISTRIBUTED MPI Krylov + AMS iterative — scales across ranks with low per-rank memory (0.5 GB @ 133k → 4.1 GB/rank @ 1.16M), target-sensitive, but completes at large scale where the direct path OOMs. Neither is uniformly better: geode wins small–medium on speed/efficiency/robustness; Palace wins at scale on memory."

# --- Correctness pointer (NOT measured here) ---------------------------------
eigenvalue_agreement = "Correctness is NOT measured here — see benchmarks/transmon_eigen/results.toml: every geode-fem physical mode agrees with Palace to ≤0.032% on this identical mesh (≤1% bar met with 25× margin)."

