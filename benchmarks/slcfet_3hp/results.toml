notes = [
  "Z = V/I at the lumped port (Palace-style uniform port, V_inc = 1, R = 50 ohm); L = Im Z / omega, Q = Im Z / Re Z, S11 vs 50 ohm.",
  "Conductor loss via the Leontovich good-conductor surface impedance on the cavity walls (Au metallization, sigma = 1/(0.01943 ohm-um) ~ 5.15e7 S/m per the canonical PDK / mom issue #358); substrate loss via tan-delta in the SiC permittivity.",
  "Stack: PASSIV (Au 3.0 um, z 0..3) underpass directly on the SiC, OVERLAY (Au 2.25 um, z 5..7.25) spiral, metals in AIR above the substrate (the geo's tag-2 'dielectric' region is assigned eps_r = 1); the 0.16 um SiN passivation is omitted from the mesh (documented stack delta, both sides).",
  "Crossover: via underpass on BOTH the FEM and mom sides so the geometries match by construction. The physical 3HP process qualifies only AIR-BRIDGE crossovers for spirals (via_underpass shorts the spiral per fab qualification) — a documented delta from the fab flow, not a simulation limitation.",
  "L comparison frequency: the FEM L = Im Z / omega is frequency-dependent (2.078 nH at 0.1 GHz falling to 1.685 at 3 GHz) because the high-k SiC substrate (eps_r 9.7) under the coil adds shunt capacitance that siphons current as f rises. Mohan (quasi-static analytic) and mom (2.5D, nearly frequency-flat at ~2.15 nH) both report the C-free low-frequency inductance, so L is compared at the f->0 quasi-static limit L0 (Richardson extrapolation of the two lowest sweep points): L0_fem ~ 2.11 nH, within ~2% of mom and ~3% of Mohan. Comparing the FEM's 3 GHz L against a DC formula was the original (apples-to-oranges) source of the apparent ~18% deficit; the FEM additionally, correctly, resolves the substrate-C dispersion the oracles omit.",
  "Leontovich validity caveat: below ~1.5 GHz the Au skin depth (2.2 um at 1 GHz) reaches the 2.25 um OVERLAY thickness, so the semi-infinite-conductor surface impedance under-reports R and inflates the internal inductance. This affects R/Q (read at 3 GHz, delta = 1.28 um) but not the L0 extrapolation (Im Z is dominated by the geometric inductance, not the small internal term).",
  "mom PEEC baseline: reference/fixtures/slcfet_mom/ — EXACT integer-turn geometry match (n = 3), the L oracle. mom is NOT a reliable Q oracle above ~2 GHz: its 3-filament lateral discretization cannot resolve the sub-2-um Au skin depth and overestimates R (issue-#211 calibration); the FEM/mom Q ratio is pinned with a tracking band, and the realistic Q oracle is the operator-assisted Palace slot.",
  "Mohan expressions assume an isolated current-sheet spiral (no feed stubs, no via underpass, zero thickness) — a sanity band, not a 5%-grade oracle. Diagnostics ruled out the truncation box (widening 44,582->76,964 edges moved L0 by <1%) and the PEC substrate floor (natural-BC floor moved L by ~3%) as deficit sources; the realized fixture footprint (185 um) and trace length (~1830 um) match/exceed the nominal n=3 geometry. The reconciling factor was the L comparison frequency (see the L-comparison note).",
]

